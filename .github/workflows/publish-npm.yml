name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag"
        required: true
        default: latest
      provenance:
        description: "Generate npm provenance attestations"
        required: true
        default: "true"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm ci

      - name: Publish
        run: node scripts/publish-packages.mjs --tag "${NPM_DIST_TAG}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_DIST_TAG: ${{ github.event.inputs.tag || 'latest' }}
          NPM_CONFIG_PROVENANCE: ${{ github.event.inputs.provenance || 'true' }}
